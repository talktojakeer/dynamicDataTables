<template>
    <div class="qual-roster-page">

        <div class="page-header">
            <h1 class="page-title">Qual Roster</h1>
            <p class="page-sub">Select Recruit Classes and/or Members, fill session details, then submit the roster</p>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="step-badge">1</span>
                <h2 class="card-title">Qual Roster Details</h2>
                <span class="card-sub">— saved to each FIR Qualification Form</span>
            </div>
            <div class="card-body">
                <div class="fields-row">

                    <div class="field-item field-item-rc">
                        <label class="field-label">Recruit Class / Member</label>

                        <div class="lookup-wrapper">
                            <div class="lookup-input-box">
                                <lightning-icon icon-name="utility:search" size="x-small" class="lookup-search-icon"></lightning-icon>
                                <input
                                    type="text"
                                    class="lookup-input"
                                    placeholder="Search Recruit Class or Contact..."
                                    value={lookupSearchKey}
                                    oninput={handleLookupSearch}
                                    onfocus={handleLookupFocus}
                                    autocomplete="off" />
                                <template if:true={isLookupSearching}>
                                    <div class="lookup-spinner">
                                        <lightning-spinner size="x-small" alternative-text="Searching..."></lightning-spinner>
                                    </div>
                                </template>
                            </div>

                            <template if:true={showLookupDropdown}>
                                <div class="lookup-dropdown">

                                    <template if:true={hasRcResults}>
                                        <div class="lookup-section-label">
                                            <lightning-icon icon-name="standard:account" size="xx-small"></lightning-icon>
                                            Recruit Classes
                                        </div>
                                        <template for:each={rcSearchResults} for:item="rc">
                                            <div key={rc.Id}
                                                class={rc.itemClass}
                                                data-id={rc.Id}
                                                data-name={rc.Name}
                                                data-type="rc"
                                                onmousedown={handleLookupSelect}>
                                                <div class="lookup-item-main">{rc.Name}</div>
                                                <template if:true={rc.alreadySelected}>
                                                    <lightning-icon icon-name="utility:check" size="xx-small" class="lookup-check-icon"></lightning-icon>
                                                </template>
                                                <template if:false={rc.alreadySelected}>
                                                    <span class="lookup-item-badge rc-badge-pill">Recruit Class</span>
                                                </template>
                                            </div>
                                        </template>
                                    </template>

                                    <template if:true={hasContactResults}>
                                        <div class="lookup-section-label">
                                            <lightning-icon icon-name="standard:contact" size="xx-small"></lightning-icon>
                                            Contacts
                                        </div>
                                        <template for:each={contactSearchResults} for:item="con">
                                            <div key={con.Id}
                                                class={con.itemClass}
                                                data-id={con.Id}
                                                data-name={con.Name}
                                                data-type="contact"
                                                data-tins={con.tins}
                                                onmousedown={handleLookupSelect}>
                                                <div class="lookup-item-main">{con.Name}</div>
                                                <template if:true={con.alreadySelected}>
                                                    <lightning-icon icon-name="utility:check" size="xx-small" class="lookup-check-icon"></lightning-icon>
                                                </template>
                                                <template if:false={con.alreadySelected}>
                                                    <span class="lookup-item-meta">{con.tins}</span>
                                                </template>
                                            </div>
                                        </template>
                                    </template>

                                    <template if:false={hasAnyResults}>
                                        <div class="lookup-no-results">
                                            <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                                            No results for "{lookupSearchKey}"
                                        </div>
                                    </template>

                                </div>
                            </template>
                        </div>

                        <template if:true={hasSelections}>
                            <div class="selection-tags">
                                <template for:each={selectedItems} for:item="item">
                                    <span key={item.id} class={item.tagClass}>
                                        <lightning-icon icon-name={item.icon} size="xx-small" class="tag-icon"></lightning-icon>
                                        <span class="tag-label">{item.name}</span>
                                        <button class="tag-remove"
                                            data-id={item.id}
                                            onclick={handleRemoveSelection}
                                            title="Remove">✕</button>
                                    </span>
                                </template>
                                <button class="clear-all-btn" onclick={handleClearAll} title="Clear all">
                                    Clear all
                                </button>
                            </div>
                        </template>
                    </div>

                    <div class="field-item">
                        <lightning-input
                            type="date"
                            label="Test Date"
                            value={testDate}
                            required
                            onchange={handleTestDateChange}>
                        </lightning-input>
                    </div>

                    <div class="field-item">
                        <label class="field-label">Firearm Instructor</label>
                        <template if:false={selectedInstructor}>
                            <div class="lookup-wrapper">
                                <div class="lookup-input-box">
                                    <lightning-icon icon-name="standard:user" size="x-small" class="lookup-search-icon"></lightning-icon>
                                    <input
                                        type="text"
                                        class="lookup-input"
                                        placeholder="Search user..."
                                        value={instructorSearchKey}
                                        oninput={handleInstructorSearch}
                                        onfocus={handleInstructorFocus}
                                        autocomplete="off" />
                                    <template if:true={isInstructorSearching}>
                                        <div class="lookup-spinner">
                                            <lightning-spinner size="x-small" alternative-text="Searching..."></lightning-spinner>
                                        </div>
                                    </template>
                                </div>
                                <template if:true={showInstructorDropdown}>
                                    <div class="lookup-dropdown">
                                        <template if:true={instructorResults.length}>
                                            <template for:each={instructorResults} for:item="usr">
                                                <div key={usr.Id}
                                                    class="lookup-item"
                                                    data-id={usr.Id}
                                                    data-name={usr.Name}
                                                    onmousedown={handleInstructorSelect}>
                                                    <div class="lookup-item-main">{usr.Name}</div>
                                                    <span class="lookup-item-meta">{usr.Title}</span>
                                                </div>
                                            </template>
                                        </template>
                                        <template if:false={instructorResults.length}>
                                            <div class="lookup-no-results">
                                                <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                                                No users found for "{instructorSearchKey}"
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:true={selectedInstructor}>
                            <div class="lookup-selected-pill">
                                <lightning-icon icon-name="standard:user" size="x-small" class="pill-icon"></lightning-icon>
                                <span class="pill-name">{selectedInstructor.Name}</span>
                                <button class="pill-clear" onclick={handleClearInstructor} title="Remove">
                                    <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                                </button>
                            </div>
                        </template>
                    </div>

                    <div class="field-item">
                        <lightning-input
                            type="text"
                            label="Location"
                            placeholder="Location..."
                            value={location}
                            onchange={handleLocationChange}>
                        </lightning-input>
                    </div>

                    <div class="field-item">
                        <label class="field-label">Lightning Condition</label>
                        <select class="inline-select top-select"
                            onchange={handleLightningConditionChange}>
                            <option value="">-- Select --</option>
                            <option value="DayTime/Norrmal Lighting"   selected={lcDaytime}>DayTime / Normal Lighting</option>
                            <option value="NightTime/Reduced Lighting" selected={lcNighttime}>NightTime / Reduced Lighting</option>
                        </select>
                    </div>

                </div>
            </div>
        </div>

        <template if:true={hasSelections}>
            <div class="table-card">

                <div class="table-toolbar">
                    <div class="toolbar-left">
                        <span class="step-badge">2</span>
                        <h2 class="card-title">Members &amp; Weapon Details</h2>
                        <span class="row-count">{memberCount} members</span>
                    </div>
                    <div class="toolbar-right">
                        <div class="toolbar-search-wrap">
                            <lightning-input
                                type="search"
                                label=""
                                placeholder="Filter by name or TINS..."
                                value={tableSearchKey}
                                onchange={handleTableSearch}
                                class="table-search">
                            </lightning-input>
                        </div>
                        <div class="toolbar-btn-wrap">
                            <lightning-button
                                variant="brand"
                                label="Add To Roster"
                                icon-name="utility:add"
                                onclick={handleAddToRoster}
                                disabled={isAddDisabled}>
                            </lightning-button>
                        </div>
                    </div>
                </div>

                <template if:true={isLoadingMembers}>
                    <div class="table-loading">
                        <lightning-spinner size="medium" alternative-text="Loading..."></lightning-spinner>
                        <p class="loading-text">Loading members...</p>
                    </div>
                </template>

                <template if:false={isLoadingMembers}>
                    <template if:true={filteredRows.length}>
                        <div class="table-scroll-wrap">
                            <table class="roster-table">
                                <colgroup>
                                    <col style="width:46px" />
                                    <col style="width:200px" />
                                    <col style="width:100px" />
                                    <col style="width:90px" />
                                    <col style="width:65px" />
                                    <col style="width:88px" />
                                    <col style="width:88px" />
                                    <col style="width:88px" />
                                    <col style="width:108px" />
                                    <col style="width:115px" />
                                </colgroup>
                                <thead>
                                    <tr class="col-header-row">
                                        <th class="th-remove"></th>
                                        <th class="th-name">Employee Name</th>
                                        <th class="th-tins">TINS</th>
                                        <th class="th-div">Division</th>
                                        <th class="th-reg">Region</th>
                                        <th class="th-weapon th-pistol">
                                            <div class="weapon-header">
                                                <span>Pistol</span>
                                                <input type="checkbox" class="weapon-col-check" title="Select all Pistol" checked={allPistol} data-field="pistol" onchange={handleSelectAllWeapon} />
                                            </div>
                                        </th>
                                        <th class="th-weapon th-shotgun">
                                            <div class="weapon-header">
                                                <span>Shot Gun</span>
                                                <input type="checkbox" class="weapon-col-check" title="Select all Shot Gun" checked={allShotgun} data-field="shotgun" onchange={handleSelectAllWeapon} />
                                            </div>
                                        </th>
                                        <th class="th-weapon th-rifle">
                                            <div class="weapon-header">
                                                <span>Riffle</span>
                                                <input type="checkbox" class="weapon-col-check" title="Select all Riffle" checked={allRifle} data-field="rifle" onchange={handleSelectAllWeapon} />
                                            </div>
                                        </th>
                                        <th class="th-weapon th-autoweapon">
                                            <div class="weapon-header">
                                                <span>Automatic Weapon</span>
                                                <input type="checkbox" class="weapon-col-check" title="Select all Automatic Weapon" checked={allAutoWeapon} data-field="autoWeapon" onchange={handleSelectAllWeapon} />
                                            </div>
                                        </th>
                                        <th class="th-weapon th-precisionrifle">
                                            <div class="weapon-header">
                                                <span>Precision Riffle</span>
                                                <input type="checkbox" class="weapon-col-check" title="Select all Precision Riffle" checked={allPrecisionRifle} data-field="precisionRifle" onchange={handleSelectAllWeapon} />
                                            </div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={filteredRows} for:item="row">
                                        <tr key={row.memberId} class={row.rowClass}>
                                            <td class="td-remove td-center">
                                                <button
                                                    class="btn-remove-row"
                                                    title="Remove member from Roster"
                                                    data-contact-id={row.contactId}
                                                    onclick={handleRemoveRow}>
                                                    <lightning-icon
                                                        icon-name="utility:dash"
                                                        size="xx-small"
                                                        alternative-text="Remove member from Roster">
                                                    </lightning-icon>
                                                </button>
                                            </td>
                                            <td class="td-name">
                                                <a href={row.contactUrl} target="_blank" class="member-link">{row.contactName}</a>
                                            </td>
                                            <td class="td-tins">{row.tins}</td>
                                            <td class="td-div">{row.division}</td>
                                            <td class="td-reg">{row.region}</td>
                                            <td class="td-weapon td-pistol td-center">
                                                <input type="checkbox" class="weapon-check" checked={row.pistol} data-contact-id={row.contactId} data-field="pistol" onchange={handleWeaponCheck} />
                                            </td>
                                            <td class="td-weapon td-shotgun td-center">
                                                <input type="checkbox" class="weapon-check" checked={row.shotgun} data-contact-id={row.contactId} data-field="shotgun" onchange={handleWeaponCheck} />
                                            </td>
                                            <td class="td-weapon td-rifle td-center">
                                                <input type="checkbox" class="weapon-check" checked={row.rifle} data-contact-id={row.contactId} data-field="rifle" onchange={handleWeaponCheck} />
                                            </td>
                                            <td class="td-weapon td-autoweapon td-center">
                                                <input type="checkbox" class="weapon-check" checked={row.autoWeapon} data-contact-id={row.contactId} data-field="autoWeapon" onchange={handleWeaponCheck} />
                                            </td>
                                            <td class="td-weapon td-precisionrifle td-center">
                                                <input type="checkbox" class="weapon-check" checked={row.precisionRifle} data-contact-id={row.contactId} data-field="precisionRifle" onchange={handleWeaponCheck} />
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                    <template if:false={filteredRows.length}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:people" size="large"></lightning-icon>
                            <p class="empty-title">No members found</p>
                            <p class="empty-sub">No member records found for the selected items, or your filter returned no results.</p>
                        </div>
                    </template>
                </template>

            </div>
        </template>

        <template if:false={hasSelections}>
            <div class="initial-state">
                <div class="initial-icon-wrap">
                    <img src={dpsBadgeUrl} alt="Texas DPS Badge" class="dps-badge-logo" />
                </div>
                <p class="initial-title">Select a Recruit Class or Member to begin</p>
                <p class="initial-sub">Search and select one or more classes or contacts above to load roster members</p>
            </div>
        </template>

    </div>

    <template if:true={showRosterLabelModal}>
        <div class="modal-backdrop" onclick={handleModalBackdropClick}></div>
        <div class="modal-container" role="dialog" aria-modal="true" aria-labelledby="modal-heading">

            <div class="modal-body">
                <h2 id="modal-heading" class="modal-title">Name Your Qual Roster</h2>
                <p class="modal-description">Give this roster a label so it's easy to identify later.</p>
                <div class="modal-field">
                    <label class="modal-field-label" for="rosterLabelInput">
                        Roster Label <span class="required-star">*</span>
                    </label>
                    <input
                        id="rosterLabelInput"
                        type="text"
                        class={rosterLabelInputClass}
                        placeholder="e.g. A-2026 Spring Qual"
                        value={rosterLabel}
                        oninput={handleRosterLabelInput}
                        maxlength="120" />
                    <template if:true={rosterLabelError}>
                        <p class="modal-field-error">
                            <lightning-icon icon-name="utility:error" size="xx-small"></lightning-icon>
                            {rosterLabelError}
                        </p>
                    </template>
                </div>
            </div>

            <div class="modal-footer">
                <lightning-button
                    variant="neutral"
                    label="Cancel"
                    onclick={handleRosterLabelCancel}>
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="Save Roster"
                    icon-name="utility:save"
                    onclick={handleRosterLabelConfirm}
                    disabled={isSavingRoster}>
                </lightning-button>
            </div>

            <template if:true={isSavingRoster}>
                <div class="modal-saving-overlay">
                    <lightning-spinner size="medium" alternative-text="Saving..."></lightning-spinner>
                </div>
            </template>
        </div>
    </template>

</template>
