<template>
    <div class="grading-page">

        <!-- ═══ LIST VIEW ═══ -->
        <template if:true={isListView}>

            <div class="page-header">
                <h1 class="page-title">Qual Roster</h1>
                <p class="page-sub">Select a roster to grade qualification results</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <lightning-icon icon-name="standard:list_email" size="small" class="list-header-icon"></lightning-icon>
                    <h2 class="card-title">Qual Rosters</h2>
                    <span class="card-sub member-count-badge">{filteredRosterCount} rosters</span>
                    <div class="list-actions">
                        <div class="search-box">
                            <lightning-icon icon-name="utility:search" size="x-small" class="search-icon"></lightning-icon>
                            <input type="text" class="search-input" placeholder="Search rosters..." value={listSearchKey} oninput={handleListSearch} />
                        </div>
                    </div>
                </div>
                <div class="card-body table-container">

                    <template if:true={isLoadingList}>
                        <div class="table-loading">
                            <lightning-spinner size="medium" alternative-text="Loading..."></lightning-spinner>
                            <p class="loading-text">Loading rosters...</p>
                        </div>
                    </template>

                    <template if:false={isLoadingList}>
                        <template if:true={hasRosterRows}>
                            <div class="table-scroll-wrap">
                                <table class="roster-list-table">
                                    <thead>
                                        <tr class="list-header-row">
                                            <th class="lh-label">Roster Label</th>
                                            <th class="lh-location">Location</th>
                                            <th class="lh-instructor">Firearm Instructor</th>
                                            <th class="lh-date">Test Date</th>
                                            <th class="lh-count">Members</th>
                                            <th class="lh-created">Created</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={filteredRosterRows} for:item="row">
                                            <tr key={row.rosterLabel} class="list-row" data-label={row.rosterLabel} onclick={handleRosterRowClick}>
                                                <td class="td-label">
                                                    <span class="label-link">{row.rosterLabel}</span>
                                                </td>
                                                <td class="td-location">{row.location}</td>
                                                <td class="td-instructor">{row.instructorName}</td>
                                                <td class="td-date">{row.testDate}</td>
                                                <td class="td-count">
                                                    <span class="count-badge">{row.memberCount}</span>
                                                </td>
                                                <td class="td-created">{row.createdDate}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasRosterRows}>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:shield" size="large"></lightning-icon>
                                <p class="empty-title">No Qual Rosters found</p>
                                <p class="empty-sub">Create a Qual Roster first using the Create Qual Roster tab.</p>
                            </div>
                        </template>
                    </template>

                </div>
            </div>

        </template>

        <!-- ═══ GRADING VIEW ═══ -->
        <template if:true={isGradingView}>

            <div class="page-header grading-page-header">
                <div class="back-row">
                    <button class="btn-back" onclick={handleBackToList}>
                        <lightning-icon icon-name="utility:chevronleft" size="x-small"></lightning-icon>
                        Back to Rosters
                    </button>
                </div>
                <h1 class="page-title">{selectedLabel}</h1>
                <p class="page-sub">Grade qualification results for this roster</p>
            </div>

            <!-- Session header -->
            <template if:true={hasGradingData}>
                <div class="card session-header-card">
                    <div class="session-header-grid">
                        <div class="session-field">
                            <span class="session-field-label">Recruit Class</span>
                            <span class="session-field-value">{gradingData.recruitClassName}</span>
                        </div>
                        <div class="session-field">
                            <span class="session-field-label">Test Date</span>
                            <span class="session-field-value">{gradingData.testDate}</span>
                        </div>
                        <div class="session-field">
                            <span class="session-field-label">Firearm Instructor</span>
                            <span class="session-field-value">{gradingData.instructorName}</span>
                        </div>
                        <div class="session-field">
                            <span class="session-field-label">Location</span>
                            <span class="session-field-value">{gradingData.location}</span>
                        </div>
                        <div class="session-field">
                            <span class="session-field-label">Light Condition</span>
                            <span class="session-field-value">{gradingData.lightCondition}</span>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Loading -->
            <template if:true={isLoadingGrading}>
                <div class="table-loading">
                    <lightning-spinner size="medium" alternative-text="Loading..."></lightning-spinner>
                    <p class="loading-text">Loading grading data...</p>
                </div>
            </template>

            <!-- Main content: sidebar + table -->
            <template if:false={isLoadingGrading}>
                <template if:true={hasGradingData}>
                    <div class="grading-layout">

                        <!-- Left sidebar -->
                        <div class="weapon-sidebar">
                            <div class="sidebar-title">WEAPONS</div>
                            <template for:each={weaponNavItems} for:item="nav">
                                <div key={nav.weaponType} class={nav.itemClass} data-weapon={nav.weaponType} onclick={handleWeaponSelect}>
                                    <div class="weapon-nav-top">
                                        <span class={nav.dotClass}></span>
                                        <span class="weapon-nav-label">{nav.label}</span>
                                    </div>
                                    <div class="weapon-nav-stat">{nav.statText} - {nav.pct}%</div>
                                    <div class="pct-bar-track">
                                        <div class={nav.barClass} style={nav.pctBarStyle}></div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Right panel -->
                        <div class="weapon-panel">
                            <template if:true={activeSummary}>
                                <div class="weapon-panel-header">
                                    <div class="weapon-panel-title-row">
                                        <span class={activeSummary.dotClass}></span>
                                        <h2 class="weapon-panel-title">{activeSummary.weaponType}</h2>
                                        <span class="badge badge-neutral">{activeSummary.badgeText}</span>
                                        <span class="badge badge-success">{activeSummary.qualified} qualified</span>
                                        <span class="badge badge-info">{activeSummary.at90} @ 90%+</span>
                                        <span class="badge badge-error">{activeSummary.notQualified} not qualified</span>
                                        <span class="graded-counter">{activeSummary.gradedText}</span>
                                    </div>
                                </div>
                            </template>

                            <template if:true={hasActiveRows}>
                                <div class="table-scroll-wrap">
                                    <table class="grading-table">
                                        <thead>
                                            <tr class="grading-header-row">
                                                <th class="th-name">Name</th>
                                                <th>Manufacturer</th>
                                                <th>Model</th>
                                                <th>Sight Type</th>
                                                <th>Weapon Code</th>
                                                <th>Qual Attempt</th>
                                                <th class="th-check">Qualified</th>
                                                <th class="th-check">Qualified at 90%?</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={activeRows} for:item="row">
                                                <tr key={row.detailId} class="grading-row">
                                                    <td class="td-name-cell"><span class="member-name">{row.memberName}</span></td>
                                                    <td class="td-readonly">{row.manufacturer}</td>
                                                    <td class="td-readonly">{row.model}</td>
                                                    <td class="td-readonly">{row.sightType}</td>
                                                    <td>
                                                        <select class="cell-select" data-detail-id={row.detailId} data-field="weaponCode" onchange={handleSelectChange}>
                                                            <option value="">--</option>
                                                            <option value="ABC" selected={row.isWeaponCodeABC}>ABC</option>
                                                            <option value="ZXC" selected={row.isWeaponCodeZXC}>ZXC</option>
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <select class="cell-select" data-detail-id={row.detailId} data-field="qualificationAttempt" onchange={handleSelectChange}>
                                                            <option value="">--</option>
                                                            <option value="1st" selected={row.is1st}>1st</option>
                                                            <option value="2nd" selected={row.is2nd}>2nd</option>
                                                            <option value="3rd" selected={row.is3rd}>3rd</option>
                                                            <option value="4th" selected={row.is4th}>4th</option>
                                                        </select>
                                                    </td>
                                                    <td class="td-check">
                                                        <input type="checkbox" class="grading-checkbox" checked={row.qualifiedYes} data-detail-id={row.detailId} data-field="qualified" onchange={handleCheckboxChange} />
                                                    </td>
                                                    <td class="td-check">
                                                        <input type="checkbox" class="grading-checkbox" checked={row.qualified90Yes} data-detail-id={row.detailId} data-field="qualified90" onchange={handleCheckboxChange} />
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Empty state for grading -->
                <template if:true={selectedLabel}>
                    <template if:false={hasGradingData}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:list" size="large"></lightning-icon>
                            <p class="empty-title">No grading data found</p>
                            <p class="empty-sub">No weapon qualification records found for "{selectedLabel}".</p>
                        </div>
                    </template>
                </template>
            </template>

        </template>

    </div>
</template>
